<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Login - XTN</title>
    <meta name="description"
        content="XSTN is a performance-driven technology execution network building scalable digital products, enterprise websites, and powerful web applications.">
    <meta name="keywords"
        content="technology, scalable web applications, tech network, developers, internship, AI systems, SaaS, UI/UX">
    <meta name="author" content="Xplorevo Pvt Ltd">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
  <script src="config.js"></script>
</head>

<body>

    <section class="auth-section">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Welcome Back</h1>
                <p>Sign in to your XTN account</p>
            </div>

            <form id="loginForm" class="auth-form">

                <!-- Username Field -->
                <div class="form-group">
                    <label>Username</label>
                    <div class="input-wrapper">
                        <span class="input-icon">&#128100;</span>
                        <input type="text" name="username" placeholder="admin" required>
                    </div>
                </div>

                <!-- Password Field -->
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon">&#128274;</span>
                        <input type="password" name="password" id="loginPassword"
                            placeholder="&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;"
                            required>
                        <button type="button" class="toggle-password"
                            onclick="togglePassword('loginPassword')">show</button>
                    </div>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="submit-btn">SIGN IN</button>

            </form>

            <!-- Links -->
            <div class="auth-links">
                <p>Don't have an account? <a href="signup.html">Sign up</a></p>
            </div>
        </div>
    </section>

    <script src="popup.js"></script>
    <script src="auth.js"></script>
<script src="main.js"></script>`n</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Join XTN</title>
  <meta name="description" content="XSTN is a performance-driven technology execution network building scalable digital products, enterprise websites, and powerful web applications.">
  <meta name="keywords" content="technology, scalable web applications, tech network, developers, internship, AI systems, SaaS, UI/UX">
  <meta name="author" content="Xplorevo Pvt Ltd">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
  <script src="config.js"></script>
</head>

<body>

  <section class="join-section">

    <div class="join-card">
      <a href="index.html" class="back-btn">← Back to Home</a>


      <h1>Join XTN</h1>
      <p>Become part of our development crew and grow with us.</p>

      <form id="joinForm">

        <div class="form-group">
          <label>Full Name</label>
          <input type="text" name="full_name" required>
        </div>

        <div class="form-group">
          <label>Email Address</label>
          <input type="email" name="email" required>
        </div>

        <div class="form-group">
          <label>Role Interested In</label>
          <select name="role">
            <option>Frontend Developer</option>
            <option>Backend Developer</option>
            <option>UI/UX Designer</option>
            <option>DevOps</option>
            <option>Other</option>
          </select>
        </div>

        <div class="form-group">
          <label>Why do you want to join?</label>
          <textarea name="message" required></textarea>
        </div>

        <button type="submit" class="submit-btn">
          Apply Now
        </button>

      </form>

      <div id="successMsg" style="display: none; text-align: center; margin-top: 20px;">
        <h3 style="color: #22c55e; margin-bottom: 10px;">Application Submitted Successfully!</h3>
        <p style="color: #cbd5e1;">We have received your application and will review it shortly.</p>
      </div>



    </div>

  </section>

  <script>
    console.log('INLINE SCRIPT EXECUTING');
    document.addEventListener('DOMContentLoaded', () => {
        console.log('DOM CONTENT LOADED');
        const f = document.getElementById('joinForm');
        if (f) {
            f.addEventListener('submit', (e) => {
                e.preventDefault();
                console.log('INLINE SUBMIT PREVENT DEFAULT REACHED!!!');
            });
        } else {
            console.log('JOIN FORM NULL!');
        }
    });
  </script>
  <script src="popup.js"></script>
  <script src="join.js"></script>
<script src="main.js"></script>`n</body>

</html>
